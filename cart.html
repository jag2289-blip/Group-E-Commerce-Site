<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shop - Cart</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">My Shop</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <div class="navbar-nav ms-auto align-items-center">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="about.html">About</a>
          <a class="nav-link" href="products.html">Products</a>
          <a class="nav-link" href="contact.html">Contact</a>
          <a href="cart.html" id="cart-count" class="cart-badge">Cart: 0</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="page-title text-center mb-2">Shopping Cart</h1>
    <p class="page-subtitle text-center mb-5">Review your items before checkout.</p>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="cart-page-box">
          <h3 class="mb-4">Items in Your Cart</h3>
          <div id="cart-items"></div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="checkout-box">
          <h3 class="mb-4">Order Summary</h3>

          <div class="summary-row">
            <span>Items</span>
            <span id="cart-item-count">0</span>
          </div>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">$0.00</span>
          </div>

          <div class="summary-row">
            <span>Estimated Tax</span>
            <span id="cart-tax">$0.00</span>
          </div>

          <div class="summary-row total-row">
            <span>Total</span>
            <span id="cart-total">$0.00</span>
          </div>

          <button class="send-btn mt-3 w-100" onclick="location.href='/checkout.html'">Proceed to Checkout</button>
          <button class="clear-cart-btn mt-3 w-100" onclick="clearCart()">Clear Cart</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-4 mt-4">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
    <div class="mt-3">
      <p class="mb-0">2026 My Shop. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
